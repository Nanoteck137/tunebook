root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/dwebble serve"
  cmd = "go build -tags \"fts5\" -o ./tmp/dwebble ./cmd/dwebble/main.go"
  delay = 1000
  exclude_dir = ["tmp", "vendor", "mockdata", "work", "web"]
  exclude_file = []
  exclude_regex = [".*_templ.go"]
  exclude_unchanged = false
  follow_symlink = false
  full_bin = ""
  include_dir = []
  include_ext = ["go", "tpl", "tmpl", "templ"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = true
  stop_on_error = true

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  time = false

[misc]
  clean_on_exit = false
